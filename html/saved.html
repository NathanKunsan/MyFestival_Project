<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyFestival</title>
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Custom Sketchbook CSS -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-paper text-pencil paper-grain p-4">

  <div id="page-content" class="w-full max-w-4xl mx-auto py-6">
    <div class="space-y-8">
      <div class="text-center max-w-xl mx-auto space-y-2">
        <h1 class="text-3xl md:text-4xl font-extrabold hover-wiggle">
          ⭐️ <span class="scribble-highlight">คำอวยพรที่บันทึกไว้</span>
        </h1>
        <p class="text-pencil-light font-bold">
          คลังของขวัญและความอบอุ่นที่คุณเคยได้รับ บันทึกเก็บไว้เพื่อหยิบขึ้นมาเปิดอ่านสร้างรอยยิ้มได้เสมอ ทุกที่ ทุกเวลา
        </p>
      </div>

      <!-- Lined Notebook Catalog containing Saved Messages -->
      <div class="sketch-card p-6 md:p-8 bg-white max-w-4xl mx-auto shadow-[6px_6px_0px_0px_#4a3c31]">
        <div class="flex justify-between items-center mb-6 border-b-2 border-pencil pb-2">
          <h2 class="text-xl font-extrabold flex items-center gap-2">📖 รายการการ์ดคำอวยพรของคุณ</h2>
          <span id="saved-total-badge" class="sketch-badge btn-yellow font-extrabold text-sm">... ข้อความ</span>
        </div>
        
        <div id="saved-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- Loading indicator -->
          <div class="col-span-full text-center py-12">
            <p class="text-lg font-bold animate-pulse">✏️ กำลังกางสมุดบันทึกส่วนตัว...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
