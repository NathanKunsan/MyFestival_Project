<div id="page-content" class="w-full max-w-xl mx-auto py-6">
  <div class="sketch-card bg-white p-6 md:p-8 flex flex-col justify-center shadow-[6px_6px_0px_0px_#4a3c31]">
    <h2 class="text-3xl font-extrabold text-center mb-1 text-pencil">🔐 ตั้งรหัสผ่านใหม่</h2>
    <p class="text-center text-pencil-light text-sm mb-6">กรุณากรอกรหัสผ่านใหม่ที่คุณต้องการใช้งาน</p>
    
    <form id="reset-password-form" class="space-y-4">
      <div class="flex flex-col gap-1">
        <label for="reset-password" class="font-bold text-sm">รหัสผ่านใหม่ (อย่างน้อย 8 ตัวอักษร):</label>
        <input type="password" id="reset-password" required minlength="8" placeholder="••••••••" class="sketch-input w-full">
      </div>
      <div class="flex flex-col gap-1">
        <label for="reset-password-confirm" class="font-bold text-sm">ยืนยันรหัสผ่านใหม่:</label>
        <input type="password" id="reset-password-confirm" required minlength="8" placeholder="••••••••" class="sketch-input w-full">
      </div>
      
      <button type="submit" class="sketch-btn btn-green w-full py-2.5 mt-2 text-lg">
        บันทึกรหัสผ่านใหม่ ✅
      </button>
    </form>
  </div>
</div>
