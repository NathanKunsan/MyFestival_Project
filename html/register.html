<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyFestival</title>
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Custom Sketchbook CSS -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-paper text-pencil paper-grain p-4">

  <div id="page-content" class="w-full max-w-md mx-auto py-6">
    <div class="sketch-card p-6 md:p-8 bg-white">
      <h2 class="text-3xl font-extrabold text-center mb-2">✏️ สมัครสมาชิก</h2>
      <p class="text-center text-pencil-light text-sm mb-6">เข้าร่วม MyFestival เพื่อรับคำอวยพรหรือเริ่มแบ่งปันคำอวยพรให้กับผู้อื่น</p>
      
      <form id="register-form" class="space-y-4">
        <div class="flex flex-col gap-1">
          <label for="register-name" class="font-bold text-sm">ชื่อผู้ใช้งาน / นามปากกา:</label>
          <input type="text" id="register-name" required placeholder="ปันสุข มีรอยยิ้ม" class="sketch-input w-full">
        </div>
        
        <div class="flex flex-col gap-1">
          <label for="register-email" class="font-bold text-sm">อีเมล (Email):</label>
          <input type="email" id="register-email" required placeholder="example@email.com" class="sketch-input w-full">
        </div>
        
        <div class="flex flex-col gap-1">
          <label for="register-password" class="font-bold text-sm">รหัสผ่าน (Password):</label>
          <input type="password" id="register-password" required placeholder="••••••••" class="sketch-input w-full">
        </div>

        
        <button type="submit" class="sketch-btn btn-orange w-full py-2.5 mt-4 text-lg">
          สมัครใช้งานระบบ ✨
        </button>
      </form>
      
      <div class="sketch-divider"></div>
      
      <div class="text-center text-sm font-bold">
        <span class="text-pencil-light">มีบัญชีผู้ใช้งานอยู่แล้ว?</span>
        <a href="/login" class="text-wood-yellow hover:underline ml-1">เข้าสู่ระบบได้ที่นี่</a>
      </div>
    </div>
  </div>

</body>
</html>
