<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyFestival</title>
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Custom Sketchbook CSS -->
  <link rel="stylesheet" href="/css/style.css">
  <!-- html2canvas CDN -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>

<body class="bg-paper text-pencil paper-grain p-4">

  <div id="page-content" class="w-full max-w-4xl mx-auto py-6">
    <div class="space-y-8">
      <!-- Header -->
      <div class="text-center max-w-xl mx-auto space-y-2">
        <h1 class="text-2xl sm:text-3xl md:text-4xl font-extrabold">
          🎨 <span class="scribble-highlight">ตกแต่งและดาวน์โหลดการ์ด</span>
        </h1>
        <p class="text-pencil-light text-xs sm:text-sm font-bold">
          เลือกสีกระดาษ ลายบรรทัดเขียนมือ และดาวน์โหลดออกมาเป็นรูปภาพส่งต่อให้เพื่อนๆ ได้เลย!
        </p>
      </div>

      <!-- Main UI Layout -->
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">

        <!-- Left: Card Live Preview -->
        <div class="lg:col-span-2 flex flex-col items-center">
          <div
            class="w-full flex justify-center p-4 bg-pencil/5 rounded-2xl border-2 border-dashed border-pencil/20 relative">

            <!-- This is the element we will capture via html2canvas -->
            <div id="capture-card-area"
              class="sketch-card p-8 md:p-12 bg-white w-full max-w-md min-h-[320px] flex flex-col justify-between relative shadow-[4px_4px_0px_0px_#4a3c31] transition-colors duration-200">

              <!-- Paper Pattern Overlay (Injected via JS classes) -->
              <div id="paper-pattern-overlay" class="absolute inset-0 pointer-events-none opacity-20 rounded-[inherit]">
              </div>

              <!-- Card Content -->
              <div class="relative z-10 flex-grow flex flex-col justify-center">
                <p id="card-text"
                  class="text-lg md:text-xl font-extrabold text-pencil leading-relaxed text-center whitespace-pre-wrap">
                  กำลังดึงข้อมูลคำอวยพรแสนอบอุ่นใจ... ⏳
                </p>
              </div>

              <div
                class="relative z-10 mt-6 pt-3 border-t-2 border-dashed border-pencil/30 flex justify-between items-center text-xs font-bold text-pencil-light">
                <span id="card-festival-name">🏷️ เทศกาล</span>
                <span id="card-signature" class="font-extrabold text-sm text-pencil">✍️ นามปากกา</span>
              </div>
            </div>

          </div>
        </div>

        <!-- Right: Customizer Panel -->
        <div class="lg:col-span-1 space-y-6">
          <div class="sketch-card p-6 bg-white shadow-[4px_4px_0px_0px_#4a3c31]">
            <h2 class="text-xl font-extrabold mb-4 pb-2 border-b-2 border-pencil">⚙️ ปรับแต่งกระดาษ</h2>
            <div class="space-y-2.5 mb-6">
              <label class="font-bold text-sm block">1. เลือกสีกระดาษ :</label>
              <div id="paper-sheets-case">
                <!-- Preset Paper Sheets and Custom Paper Sheets will be rendered here dynamically -->
              </div>
            </div>

            <!-- 2. Pattern Choice -->
            <div class="space-y-2.5 mb-6">
              <label class="font-bold text-sm block">2. เลือกลายกระดาษ (Paper Pattern):</label>
              <div class="grid grid-cols-2 gap-2">
                <button type="button" class="pattern-btn sketch-btn btn-yellow text-xs py-1.5 font-bold"
                  data-pattern="plain">
                  กระดาษเปล่า
                </button>
                <button type="button" class="pattern-btn sketch-btn btn-cream text-xs py-1.5 font-bold"
                  data-pattern="lined">
                  สมุดเส้นบรรทัด
                </button>
                <button type="button" class="pattern-btn sketch-btn btn-cream text-xs py-1.5 font-bold"
                  data-pattern="grid">
                  กระดาษตาราง
                </button>
                <button type="button" class="pattern-btn sketch-btn btn-cream text-xs py-1.5 font-bold"
                  data-pattern="wood-frame">
                  กรอบไม้ระบายสี
                </button>
                <button type="button" class="pattern-btn sketch-btn btn-cream text-xs py-1.5 font-bold"
                  data-pattern="washi-tape">
                  เทปตกแต่งมุม
                </button>
                <button type="button" class="pattern-btn sketch-btn btn-cream text-xs py-1.5 font-bold"
                  data-pattern="botanical">
                  ใบไม้ธรรมชาติ
                </button>
                <button type="button" class="pattern-btn sketch-btn btn-cream text-xs py-1.5 font-bold"
                  data-pattern="ticket">
                  ขอบตั๋วโบราณ
                </button>
                <button type="button" class="pattern-btn sketch-btn btn-cream text-xs py-1.5 font-bold"
                  data-pattern="sparkles">
                  ประกายดาววิบวับ
                </button>
              </div>
            </div>

            <!-- 3. Font Color Choice -->
            <div class="space-y-2.5 mb-6">
              <label class="font-bold text-sm block">3. เลือกสีตัวอักษร :</label>
              <div id="text-pencil-holder-case">
                <!-- Preset Colored Pencils and Custom Colored Pencils for font color will be rendered here dynamically -->
              </div>
            </div>

            <div class="sketch-divider"></div>

            <!-- Download Button -->
            <button type="button" id="btn-download-png"
              class="sketch-btn btn-green w-full py-2.5 text-base font-bold mb-3">
              ดาวน์โหลดเป็นรูปภาพ (.PNG) 💾
            </button>

            <!-- Back Button -->
            <button type="button" id="btn-back-to-wish" class="sketch-btn btn-cream w-full py-2 text-sm">
              ย้อนกลับหน้าสุ่มการ์ด ↩️
            </button>
          </div>
        </div>

      </div>
    </div>

    <!-- Add Custom Color Modal -->
    <div id="add-color-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 px-4">
      <div
        class="sketch-card p-6 max-w-sm w-full bg-white relative max-h-[90vh] overflow-y-auto shadow-[6px_6px_0px_0px_#4a3c31]">
        <button id="btn-close-color-modal-x"
          class="absolute top-4 right-4 text-pencil hover:text-wood-red font-bold text-2xl"
          aria-label="Close modal">×</button>

        <h3 id="color-modal-title" class="text-xl font-extrabold mb-4 pb-2 border-b-2 border-pencil text-center">🎨
          ผสมสีกระดาษใหม่</h3>

        <form id="add-color-form" class="space-y-4">

          <!-- Preset Palette for Fast Selection inside modal -->
          <div class="space-y-2">
            <label id="modal-preset-title" class="font-bold text-sm block text-pencil">จานสียอดนิยม (Pastel Presets):</label>
            <div id="modal-preset-colors-container" class="grid grid-cols-5 gap-2">
              <button type="button"
                class="modal-preset-color w-8 h-8 rounded-full border-2 border-pencil focus:scale-110 shadow-[1px_1px_0px_var(--color-pencil)] transition-all"
                style="background-color: #fffefb;" data-hex="#fffefb"></button>
              <button type="button"
                class="modal-preset-color w-8 h-8 rounded-full border-2 border-pencil focus:scale-110 shadow-[1px_1px_0px_var(--color-pencil)] transition-all"
                style="background-color: #fde2e4;" data-hex="#fde2e4"></button>
              <button type="button"
                class="modal-preset-color w-8 h-8 rounded-full border-2 border-pencil focus:scale-110 shadow-[1px_1px_0px_var(--color-pencil)] transition-all"
                style="background-color: #cce3f5;" data-hex="#cce3f5"></button>
              <button type="button"
                class="modal-preset-color w-8 h-8 rounded-full border-2 border-pencil focus:scale-110 shadow-[1px_1px_0px_var(--color-pencil)] transition-all"
                style="background-color: #e2ece9;" data-hex="#e2ece9"></button>
              <button type="button"
                class="modal-preset-color w-8 h-8 rounded-full border-2 border-pencil focus:scale-110 shadow-[1px_1px_0px_var(--color-pencil)] transition-all"
                style="background-color: #f0e6ef;" data-hex="#f0e6ef"></button>
 
              <button type="button"
                class="modal-preset-color w-8 h-8 rounded-full border-2 border-pencil focus:scale-110 shadow-[1px_1px_0px_var(--color-pencil)] transition-all"
                style="background-color: #fefae0;" data-hex="#fefae0"></button>
              <button type="button"
                class="modal-preset-color w-8 h-8 rounded-full border-2 border-pencil focus:scale-110 shadow-[1px_1px_0px_var(--color-pencil)] transition-all"
                style="background-color: #faedcd;" data-hex="#faedcd"></button>
              <button type="button"
                class="modal-preset-color w-8 h-8 rounded-full border-2 border-pencil focus:scale-110 shadow-[1px_1px_0px_var(--color-pencil)] transition-all"
                style="background-color: #d8f3dc;" data-hex="#d8f3dc"></button>
              <button type="button"
                class="modal-preset-color w-8 h-8 rounded-full border-2 border-pencil focus:scale-110 shadow-[1px_1px_0px_var(--color-pencil)] transition-all"
                style="background-color: #ffe5ec;" data-hex="#ffe5ec"></button>
              <button type="button"
                class="modal-preset-color w-8 h-8 rounded-full border-2 border-pencil focus:scale-110 shadow-[1px_1px_0px_var(--color-pencil)] transition-all"
                style="background-color: #e8dbcd;" data-hex="#e8dbcd"></button>
            </div>
          </div>

          <!-- Color Wheel & Preview -->
          <div class="space-y-4 pt-2">
            <label class="font-bold text-sm block text-pencil text-center">เลือกสีจากวงล้อสี:</label>

            <div class="flex flex-col items-center justify-center gap-4">
              <!-- Canvas Color Wheel -->
              <canvas id="color-wheel-canvas" width="160" height="160"
                class="cursor-pointer rounded-full border-3 border-pencil shadow-md"></canvas>

              <!-- Color Preview Block -->
              <div class="flex items-center gap-4 py-1.5 w-full justify-center">
                <div id="hsl-color-preview"
                  class="w-12 h-12 rounded-full border-3 border-pencil shadow-[2px_2px_0px_0px_#4a3c31] bg-white transition-colors duration-100">
                </div>
                <div class="flex flex-col gap-0.5">
                  <label for="user-color-hex" class="font-bold text-xs text-pencil-light">รหัสสี HEX:</label>
                  <input type="text" id="user-color-hex" placeholder="#FFFFFF" maxlength="7"
                    class="sketch-input text-sm py-1 px-3 w-32 uppercase font-bold text-center border-2 border-pencil bg-white">
                </div>
              </div>
            </div>
          </div>

          <div class="sketch-divider"></div>

          <div class="flex justify-end gap-3">
            <button type="submit" id="btn-submit-color"
              class="sketch-btn btn-yellow px-5 py-1.5 text-sm font-bold">บันทึกสีนี้ 💾</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Mobile Download/Save Image Preview Modal -->
    <div id="mobile-download-modal"
      class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 px-4 py-6">
      <div
        class="sketch-card p-6 max-w-sm w-full bg-white relative max-h-[95vh] flex flex-col justify-between overflow-y-auto">
        <button id="btn-close-mobile-download-x"
          class="absolute top-4 right-4 text-pencil hover:text-wood-red font-bold text-2xl"
          aria-label="Close modal">×</button>

        <div class="text-center mb-2">
          <h3 class="text-xl font-extrabold text-pencil">📱 บันทึกรูปภาพ</h3>
          <p class="text-xs font-bold text-pencil-light">แตะค้างที่รูปภาพด้านล่างเพื่อบันทึกการ์ดคำอวยพรลงเครื่อง</p>
        </div>

        <div
          class="flex-grow flex items-center justify-center my-4 overflow-hidden border-2 border-pencil rounded-lg bg-pencil-soft/10">
          <img id="mobile-download-img" class="max-h-[50vh] max-w-full object-contain pointer-events-auto"
            alt="การ์ดอวยพรของคุณ">
        </div>

        <button type="button" id="btn-close-mobile-download"
          class="sketch-btn btn-cream w-full py-2 text-sm font-bold mt-2">
          ปิดหน้าต่าง
        </button>
      </div>
    </div>

  </div>

</body>

</html>
