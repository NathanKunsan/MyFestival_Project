<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyFestival</title>
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Custom Sketchbook CSS -->
  <link rel="stylesheet" href="/css/style.css">
  <!-- html2canvas CDN -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>

<body class="bg-paper text-pencil paper-grain p-4">

  <div id="page-content" class="w-full max-w-4xl mx-auto py-6">
    <div class="space-y-8">
      <!-- Header -->
      <div class="text-center max-w-xl mx-auto space-y-2">
        <h1 class="text-2xl sm:text-3xl md:text-4xl font-extrabold hover-wiggle">
          🎨 <span class="scribble-highlight">ตกแต่งและดาวน์โหลดการ์ด</span>
        </h1>
        <p class="text-pencil-light text-xs sm:text-sm font-bold">
          เลือกสีกระดาษ ลายบรรทัดเขียนมือ และดาวน์โหลดออกมาเป็นรูปภาพส่งต่อให้เพื่อนๆ ได้เลย!
        </p>
      </div>

      <!-- Main UI Layout -->
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">

        <!-- Left: Card Live Preview -->
        <div class="lg:col-span-2 flex flex-col items-center">
          <div
            class="w-full flex justify-center p-4 bg-pencil/5 rounded-2xl border-2 border-dashed border-pencil/20 relative">

            <!-- This is the element we will capture via html2canvas -->
            <div id="capture-card-area"
              class="sketch-card p-8 md:p-12 bg-white w-full max-w-md min-h-[320px] flex flex-col justify-between relative shadow-[4px_4px_0px_0px_#4a3c31] transition-colors duration-200">

              <!-- Paper Pattern Overlay (Injected via JS classes) -->
              <div id="paper-pattern-overlay" class="absolute inset-0 pointer-events-none opacity-20 rounded-[inherit]">
              </div>
              <!-- Spiral Rings Element (Shown only when spiral pattern is active) -->
              <div id="paper-spiral-rings"
                class="hidden absolute left-[6px] top-[10px] bottom-[10px] w-[20px] text-[#7c6858] font-normal text-[16px] leading-[1.55] z-20 opacity-80 whitespace-pre pointer-events-none">
                ➰
                ➰
                ➰
                ➰
                ➰
                ➰
                ➰
                ➰
                ➰
                ➰
                ➰
                ➰</div>

              <!-- Card Content -->
              <div class="relative z-10 flex-grow flex flex-col justify-center">
                <p id="card-text"
                  class="text-lg md:text-xl font-extrabold text-pencil leading-relaxed text-center whitespace-pre-wrap">
                  กำลังดึงข้อมูลคำอวยพรแสนอบอุ่นใจ... ⏳
                </p>
              </div>

              <div
                class="relative z-10 mt-6 pt-3 border-t-2 border-dashed border-pencil/30 flex justify-between items-center text-xs font-bold text-pencil-light">
                <span id="card-festival-name">🏷️ เทศกาล</span>
                <span id="card-signature" class="font-extrabold text-sm text-pencil">✍️ นามปากกา</span>
              </div>
            </div>

          </div>
        </div>

        <!-- Right: Customizer Panel -->
        <div class="lg:col-span-1 space-y-6">
          <div class="sketch-card p-6 bg-white shadow-[4px_4px_0px_0px_#4a3c31]">
            <h2 class="text-xl font-extrabold mb-4 pb-2 border-b-2 border-pencil">⚙️ ปรับแต่งกระดาษ</h2>

            <!-- 1. Color Picker -->
            <div class="space-y-2.5 mb-6">
              <label class="font-bold text-sm block">1. เลือกสีกระดาษ (Paper Color):</label>
              <div id="paper-colors-wrapper" class="relative w-full max-w-[320px] aspect-[320/260] mx-auto">
                <!-- SVG Palette and Brush Background -->
                <svg viewBox="0 0 320 260" class="absolute inset-0 w-full h-full drop-shadow-md select-none pointer-events-none" xmlns="http://www.w3.org/2000/svg">
                  <!-- Wooden Palette base -->
                  <path d="M 270,90 
                           C 310,130 310,190 260,220 
                           C 210,250 140,240 100,220 
                           C 70,205 70,180 80,160 
                           C 90,140 60,110 50,90 
                           C 35,60 70,25 120,20 
                           C 180,15 230,50 270,90 Z" 
                        fill="#e8cb9f" stroke="#4a3c31" stroke-width="4" stroke-linejoin="round" />
                  
                  <!-- Wood grain details -->
                  <path d="M 100,45 C 130,40 180,55 210,95" fill="none" stroke="#d5b382" stroke-width="3" stroke-linecap="round" />
                  <path d="M 130,210 C 170,215 210,205 235,180" fill="none" stroke="#d5b382" stroke-width="3" stroke-linecap="round" />

                  <!-- Thumb hole -->
                  <ellipse cx="105" cy="180" rx="15" ry="22" transform="rotate(-20 105 180)" fill="#faf6ee" stroke="#4a3c31" stroke-width="4" />

                  <!-- Painter's Brush -->
                  <g transform="translate(18, 15) rotate(-15)">
                    <!-- Brush Handle -->
                    <path d="M 25,240 C 23,240 20,230 18,120 C 18,80 22,60 25,50 C 28,60 32,80 32,120 C 30,230 27,240 25,240 Z" fill="#b17a50" stroke="#4a3c31" stroke-width="3" />
                    <!-- Ferrule -->
                    <path d="M 22,60 L 28,60 L 29,40 L 21,40 Z" fill="#d1d5db" stroke="#4a3c31" stroke-width="3" />
                    <!-- Bristles -->
                    <path d="M 21,40 C 21,25 25,10 25,10 C 25,10 29,25 29,40 Z" fill="#583f2e" stroke="#4a3c31" stroke-width="3" />
                    <!-- Brush Tip Paint -->
                    <path id="brush-tip-paint" d="M 23,25 C 25,10 25,10 27,25 C 26,30 24,30 23,25 Z" fill="#fffefb" />
                  </g>
                </svg>

                <!-- Active Color Preview in the Center of the Palette -->
                <div id="palette-center-preview" class="absolute w-12 h-12 rounded-full border-4 border-dashed border-pencil/30 flex items-center justify-center pointer-events-none shadow-[inset_1px_1px_4px_rgba(74,60,49,0.2)] bg-white transition-all duration-300" style="left: 45%; top: 44%; transform: translate(-50%, -50%);">
                  <div id="palette-center-preview-inner" class="w-8 h-8 rounded-full border-2 border-pencil shadow-inner bg-[#fffefb] transition-colors duration-300"></div>
                </div>
                
                <!-- Preset Colors (upper curve) -->
                <button type="button" class="color-swatch absolute w-8 h-8 rounded-full border-2 border-pencil focus:scale-110 shadow-[1.5px_1.5px_0px_var(--color-pencil)] active:translate-x-[0.5px] active:translate-y-[0.5px] active:shadow-none transition-all" 
                        style="background-color: #fffefb; left: 42%; top: 16%;" data-color="#fffefb" title="สีขาวครีม"></button>
                <button type="button" class="color-swatch absolute w-8 h-8 rounded-full border-2 border-pencil focus:scale-110 shadow-[1.5px_1.5px_0px_var(--color-pencil)] active:translate-x-[0.5px] active:translate-y-[0.5px] active:shadow-none transition-all" 
                        style="background-color: #fde2e4; left: 56%; top: 16%;" data-color="#fde2e4" title="สีชมพูพาสเทล"></button>
                <button type="button" class="color-swatch absolute w-8 h-8 rounded-full border-2 border-pencil focus:scale-110 shadow-[1.5px_1.5px_0px_var(--color-pencil)] active:translate-x-[0.5px] active:translate-y-[0.5px] active:shadow-none transition-all" 
                        style="background-color: #cce3f5; left: 70%; top: 22%;" data-color="#cce3f5" title="สีฟ้าพาสเทล"></button>
                <button type="button" class="color-swatch absolute w-8 h-8 rounded-full border-2 border-pencil focus:scale-110 shadow-[1.5px_1.5px_0px_var(--color-pencil)] active:translate-x-[0.5px] active:translate-y-[0.5px] active:shadow-none transition-all" 
                        style="background-color: #e2ece9; left: 80%; top: 33%;" data-color="#e2ece9" title="สีเขียวพาสเทล"></button>
                <button type="button" class="color-swatch absolute w-8 h-8 rounded-full border-2 border-pencil focus:scale-110 shadow-[1.5px_1.5px_0px_var(--color-pencil)] active:translate-x-[0.5px] active:translate-y-[0.5px] active:shadow-none transition-all" 
                        style="background-color: #f0e6ef; left: 84%; top: 48%;" data-color="#f0e6ef" title="สีม่วงพาสเทล"></button>
                
                <!-- Dynamic custom colors list -->
                <div id="user-colors-list"></div>

                <!-- Add color (+) button -->
                <button type="button" id="btn-open-color-picker" class="hidden absolute w-8 h-8 rounded-full border-2 border-dashed border-pencil/60 hover:border-pencil hover:bg-pencil-soft/30 flex items-center justify-center text-md font-black focus:scale-110 shadow-[1px_1px_0px_var(--color-pencil)] active:translate-x-[0.5px] active:translate-y-[0.5px] active:shadow-none transition-all" title="เพิ่มสีกำหนดเอง">+</button>
              </div>
            </div>

            <!-- 2. Pattern Choice -->
            <div class="space-y-2.5 mb-6">
              <label class="font-bold text-sm block">2. เลือกลายกระดาษ (Paper Pattern):</label>
              <div class="grid grid-cols-2 gap-2">
                <button type="button" class="pattern-btn sketch-btn btn-yellow text-xs py-1.5 font-bold"
                  data-pattern="plain">
                  กระดาษเปล่า
                </button>
                <button type="button" class="pattern-btn sketch-btn btn-cream text-xs py-1.5 font-bold"
                  data-pattern="lined">
                  สมุดเส้นบรรทัด
                </button>
                <button type="button" class="pattern-btn sketch-btn btn-cream text-xs py-1.5 font-bold"
                  data-pattern="grid">
                  กระดาษตาราง
                </button>
                <button type="button" class="pattern-btn sketch-btn btn-cream text-xs py-1.5 font-bold"
                  data-pattern="spiral">
                  สมุดห่วงเหล็ก
                </button>
              </div>
            </div>

            <div class="sketch-divider"></div>

            <!-- Download Button -->
            <button type="button" id="btn-download-png"
              class="sketch-btn btn-green w-full py-2.5 text-base font-bold mb-3">
              ดาวน์โหลดเป็นรูปภาพ (.PNG) 💾
            </button>

            <!-- Back Button -->
            <button type="button" id="btn-back-to-wish" class="sketch-btn btn-cream w-full py-2 text-sm">
              ย้อนกลับหน้าสุ่มการ์ด ↩️
            </button>
          </div>
        </div>

      </div>
    </div>

    <!-- Add Custom Color Modal -->
    <div id="add-color-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 px-4">
      <div class="sketch-card p-6 max-w-sm w-full bg-white relative">
        <button id="btn-close-color-modal-x"
          class="absolute top-4 right-4 text-pencil hover:text-wood-red font-bold text-2xl"
          aria-label="Close modal">×</button>

        <h3 id="color-modal-title" class="text-xl font-extrabold mb-4 pb-2 border-b-2 border-pencil text-center">🎨 ผสมสีกระดาษใหม่</h3>

        <form id="add-color-form" class="space-y-4">
          <div class="flex flex-col items-center gap-3">
            <label class="font-bold text-sm">เลือกสีหรือกรอกรหัสสี:</label>
            <div class="flex items-center gap-4">
              <input type="color" id="user-color-picker"
                class="w-16 h-16 rounded-full border-4 border-pencil cursor-pointer bg-transparent shadow-[3px_3px_0px_var(--color-pencil)]"
                value="#ffffff">
              <div class="flex flex-col gap-1">
                <label for="user-color-hex" class="font-bold text-xs text-pencil-light">รหัสสี HEX:</label>
                <input type="text" id="user-color-hex" placeholder="#FFFFFF"
                  class="sketch-input text-sm py-1 px-3 w-32 uppercase font-bold text-center" maxlength="7">
              </div>
            </div>
          </div>

          <div class="sketch-divider"></div>

          <div class="flex justify-end gap-3">
            <button type="button" id="btn-close-color-modal"
              class="sketch-btn btn-cream px-4 py-1.5 text-sm">ยกเลิก</button>
            <button type="submit" id="btn-submit-color" class="sketch-btn btn-yellow px-5 py-1.5 text-sm font-bold">บันทึกสีนี้ 💾</button>
          </div>
        </form>
      </div>
    </div>

  </div>

</body>

</html>
