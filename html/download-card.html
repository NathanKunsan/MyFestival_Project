<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyFestival</title>
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Custom Sketchbook CSS -->
  <link rel="stylesheet" href="/css/style.css">
  <!-- html2canvas CDN -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body class="bg-paper text-pencil paper-grain p-4">

  <div id="page-content" class="w-full max-w-4xl mx-auto py-6">
    <div class="space-y-8">
      <!-- Header -->
      <div class="text-center max-w-xl mx-auto space-y-2">
        <h1 class="text-2xl sm:text-3xl md:text-4xl font-extrabold hover-wiggle">
          🎨 <span class="scribble-highlight">ตกแต่งและดาวน์โหลดการ์ด</span>
        </h1>
        <p class="text-pencil-light text-xs sm:text-sm font-bold">
          เลือกสีกระดาษ ลายบรรทัดเขียนมือ และดาวน์โหลดออกมาเป็นรูปภาพส่งต่อให้เพื่อนๆ ได้เลย!
        </p>
      </div>

      <!-- Main UI Layout -->
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
        
        <!-- Left: Card Live Preview -->
        <div class="lg:col-span-2 flex flex-col items-center">
          <div class="w-full flex justify-center p-4 bg-pencil/5 rounded-2xl border-2 border-dashed border-pencil/20 relative">
            
            <!-- This is the element we will capture via html2canvas -->
            <div id="capture-card-area" class="sketch-card p-8 md:p-12 bg-white w-full max-w-md min-h-[320px] flex flex-col justify-between relative shadow-[4px_4px_0px_0px_#4a3c31] transition-colors duration-200">
              
              <!-- Paper Pattern Overlay (Injected via JS classes) -->
              <div id="paper-pattern-overlay" class="absolute inset-0 pointer-events-none opacity-20 rounded-[inherit]"></div>
              <!-- Spiral Rings Element (Shown only when spiral pattern is active) -->
              <div id="paper-spiral-rings" class="hidden absolute left-[6px] top-[10px] bottom-[10px] w-[20px] text-[#7c6858] font-normal text-[16px] leading-[1.55] z-20 opacity-80 whitespace-pre pointer-events-none">➰
➰
➰
➰
➰
➰
➰
➰
➰
➰
➰
➰</div>
              
              <!-- Card Content -->
              <div class="relative z-10 flex-grow flex flex-col justify-center">
                <p id="card-text" class="text-lg md:text-xl font-extrabold text-pencil leading-relaxed text-center whitespace-pre-wrap">
                  กำลังดึงข้อมูลคำอวยพรแสนอบอุ่นใจ... ⏳
                </p>
              </div>
              
              <div class="relative z-10 mt-6 pt-3 border-t-2 border-dashed border-pencil/30 flex justify-between items-center text-xs font-bold text-pencil-light">
                <span id="card-festival-name">🏷️ เทศกาล</span>
                <span id="card-signature" class="font-extrabold text-sm text-pencil">✍️ นามปากกา</span>
              </div>
            </div>

          </div>
        </div>

        <!-- Right: Customizer Panel -->
        <div class="lg:col-span-1 space-y-6">
          <div class="sketch-card p-6 bg-white shadow-[4px_4px_0px_0px_#4a3c31]">
            <h2 class="text-xl font-extrabold mb-4 pb-2 border-b-2 border-pencil">⚙️ ปรับแต่งกระดาษ</h2>

            <!-- 1. Color Picker -->
            <div class="space-y-2.5 mb-6">
              <label class="font-bold text-sm block">1. เลือกสีกระดาษ (Paper Color):</label>
              <div id="paper-colors-row" class="flex flex-wrap gap-2.5 items-center">
                <!-- Preset Colors (5 colors) -->
                <button type="button" class="color-swatch w-10 h-10 rounded-full border-2 border-pencil focus:scale-110 shadow-[2px_2px_0px_var(--color-pencil)] active:translate-x-[1px] active:translate-y-[1px] active:shadow-none transition-all" 
                        style="background-color: #fffefb;" data-color="#fffefb" title="สีขาวครีม"></button>
                <button type="button" class="color-swatch w-10 h-10 rounded-full border-2 border-pencil focus:scale-110 shadow-[2px_2px_0px_var(--color-pencil)] active:translate-x-[1px] active:translate-y-[1px] active:shadow-none transition-all" 
                        style="background-color: #fde2e4;" data-color="#fde2e4" title="สีชมพูพาสเทล"></button>
                <button type="button" class="color-swatch w-10 h-10 rounded-full border-2 border-pencil focus:scale-110 shadow-[2px_2px_0px_var(--color-pencil)] active:translate-x-[1px] active:translate-y-[1px] active:shadow-none transition-all" 
                        style="background-color: #cce3f5;" data-color="#cce3f5" title="สีฟ้าพาสเทล"></button>
                <button type="button" class="color-swatch w-10 h-10 rounded-full border-2 border-pencil focus:scale-110 shadow-[2px_2px_0px_var(--color-pencil)] active:translate-x-[1px] active:translate-y-[1px] active:shadow-none transition-all" 
                        style="background-color: #e2ece9;" data-color="#e2ece9" title="สีเขียวพาสเทล"></button>
                <button type="button" class="color-swatch w-10 h-10 rounded-full border-2 border-pencil focus:scale-110 shadow-[2px_2px_0px_var(--color-pencil)] active:translate-x-[1px] active:translate-y-[1px] active:shadow-none transition-all" 
                        style="background-color: #f0e6ef;" data-color="#f0e6ef" title="สีม่วงพาสเทล"></button>
                
                <!-- Dynamic custom colors list -->
                <div id="user-colors-list" class="flex flex-wrap gap-2.5 items-center"></div>

                <!-- Add color (+) button -->
                <button type="button" id="btn-open-color-picker" class="hidden w-10 h-10 rounded-full border-2 border-dashed border-pencil/60 hover:border-pencil hover:bg-pencil-soft/30 flex items-center justify-center text-lg font-black focus:scale-110 shadow-[1.5px_1.5px_0px_var(--color-pencil)] active:translate-x-[1px] active:translate-y-[1px] active:shadow-none transition-all" title="เพิ่มสีกำหนดเอง">+</button>
              </div>
            </div>

            <!-- 2. Pattern Choice -->
            <div class="space-y-2.5 mb-6">
              <label class="font-bold text-sm block">2. เลือกลายกระดาษ (Paper Pattern):</label>
              <div class="grid grid-cols-2 gap-2">
                <button type="button" class="pattern-btn sketch-btn btn-yellow text-xs py-1.5 font-bold" data-pattern="plain">
                  กระดาษเปล่า
                </button>
                <button type="button" class="pattern-btn sketch-btn btn-cream text-xs py-1.5 font-bold" data-pattern="lined">
                  สมุดเส้นบรรทัด
                </button>
                <button type="button" class="pattern-btn sketch-btn btn-cream text-xs py-1.5 font-bold" data-pattern="grid">
                  กระดาษตาราง
                </button>
                <button type="button" class="pattern-btn sketch-btn btn-cream text-xs py-1.5 font-bold" data-pattern="spiral">
                  สมุดห่วงเหล็ก
                </button>
              </div>
            </div>

            <div class="sketch-divider"></div>

            <!-- Download Button -->
            <button type="button" id="btn-download-png" class="sketch-btn btn-green w-full py-2.5 text-base font-bold mb-3">
              ดาวน์โหลดเป็นรูปภาพ (.PNG) 💾
            </button>

            <!-- Back Button -->
            <button type="button" id="btn-back-to-wish" class="sketch-btn btn-cream w-full py-2 text-sm">
              ย้อนกลับหน้าสุ่มการ์ด ↩️
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>



  <!-- Add Custom Color Modal -->
  <div id="add-color-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 px-4">
    <div class="sketch-card p-6 max-w-sm w-full bg-white relative">
      <button id="btn-close-color-modal-x" class="absolute top-4 right-4 text-pencil hover:text-wood-red font-bold text-2xl" aria-label="Close modal">×</button>
      
      <h3 class="text-xl font-extrabold mb-4 pb-2 border-b-2 border-pencil text-center">🎨 ผสมสีกระดาษใหม่</h3>
      
      <form id="add-color-form" class="space-y-4">
        <div class="flex flex-col items-center gap-3">
          <label class="font-bold text-sm">เลือกสีหรือกรอกรหัสสี:</label>
          <div class="flex items-center gap-4">
            <input type="color" id="user-color-picker" class="w-16 h-16 rounded-full border-4 border-pencil cursor-pointer bg-transparent shadow-[3px_3px_0px_var(--color-pencil)]" value="#ffffff">
            <div class="flex flex-col gap-1">
              <label for="user-color-hex" class="font-bold text-xs text-pencil-light">รหัสสี HEX:</label>
              <input type="text" id="user-color-hex" placeholder="#FFFFFF" class="sketch-input text-sm py-1 px-3 w-32 uppercase font-bold text-center" maxlength="7">
            </div>
          </div>
        </div>
        
        <div class="sketch-divider"></div>
        
        <div class="flex justify-end gap-3">
          <button type="button" id="btn-close-color-modal" class="sketch-btn btn-cream px-4 py-1.5 text-sm">ยกเลิก</button>
          <button type="submit" class="sketch-btn btn-yellow px-5 py-1.5 text-sm font-bold">บันทึกสีนี้ 💾</button>
        </div>
      </form>
    </div>
  </div>

</body>
</html>
