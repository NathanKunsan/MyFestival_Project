<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ข้อมูลส่วนตัว — MyFestival</title>
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Custom Sketchbook CSS -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-paper text-pencil paper-grain p-4">

  <div id="page-content" class="w-full max-w-xl mx-auto py-6">
    <div class="sketch-card p-6 md:p-8 bg-white">
      <h2 class="text-3xl font-extrabold text-center mb-2">👤 ข้อมูลส่วนตัว</h2>
      <p class="text-center text-pencil-light text-sm mb-6">แก้ไขโปรไฟล์และความต้องการใช้งานของคุณที่นี่</p>
      
      <!-- Profile Form -->
      <form id="profile-form" class="space-y-4">
        <div class="flex flex-col items-center gap-2 mb-6">
          <div class="relative w-24 h-24 rounded-full border-4 border-pencil overflow-hidden bg-pencil-soft shadow-[3px_3px_0px_0px_#4a3c31]">
            <img id="profile-avatar-preview" src="https://api.dicebear.com/7.x/fun-emoji/svg?seed=guest" class="w-full h-full object-cover" alt="Avatar Preview">
          </div>
          <span id="profile-role-badge" class="sketch-badge btn-yellow text-xs font-black uppercase mt-1">
            ...
          </span>
        </div>

        <div class="flex flex-col gap-1">
          <label for="profile-email" class="font-bold text-sm">อีเมลผู้ใช้งาน (ไม่สามารถแก้ไขได้):</label>
          <input type="email" id="profile-email" disabled class="sketch-input w-full bg-pencil-soft/20 cursor-not-allowed">
        </div>

        <div class="flex flex-col gap-1">
          <label for="profile-name" class="font-bold text-sm">ชื่อจริง / นามปากกา:</label>
          <input type="text" id="profile-name" required placeholder="ระบุชื่อผู้ใช้งาน" class="sketch-input w-full">
        </div>

        <div class="flex flex-col gap-1">
          <label for="profile-avatar-url" class="font-bold text-sm">ลิงก์รูปโปรไฟล์ (Avatar URL):</label>
          <input type="url" id="profile-avatar-url" placeholder="https://example.com/avatar.jpg" class="sketch-input w-full">
          <span class="text-xs text-pencil-light font-bold">💡 สามารถเว้นว่างไว้เพื่อสุ่มใช้ Fun Emoji จาก Dicebear</span>
        </div>

        <div id="profile-role-section" class="flex flex-col gap-1">
          <label class="font-bold text-sm mb-1">บทบาทผู้ใช้งาน (Role):</label>
          <div id="profile-role-container" class="grid grid-cols-2 gap-3">
            <label class="flex items-center gap-2 p-3 border-2 border-pencil rounded-lg cursor-pointer bg-wood-yellow/10 hover:bg-wood-yellow/20">
              <input type="radio" name="profile-role" value="member" class="accent-pencil">
              <div class="text-sm font-bold">
                <div>Member (ผู้อ่าน)</div>
                <span class="text-xs text-pencil-light font-normal">เน้นการสุ่มรับพรและเซฟการ์ด</span>
              </div>
            </label>
            <label class="flex items-center gap-2 p-3 border-2 border-pencil rounded-lg cursor-pointer bg-wood-orange/10 hover:bg-wood-orange/20">
              <input type="radio" name="profile-role" value="contributor" class="accent-pencil">
              <div class="text-sm font-bold">
                <div>Contributor (ผู้ส่งมอบ)</div>
                <span class="text-xs text-pencil-light font-normal">เขียนและอนุมัติคำอวยพรร่วมกัน</span>
              </div>
            </label>
          </div>
          <!-- Admin lock explanation if user is admin -->
          <p id="admin-notice" class="hidden text-xs text-wood-red font-black mt-1">
            🔒 คุณเป็นผู้ดูแลระบบ (Admin) ไม่สามารถปรับลดระดับบทบาทของตนเองได้
          </p>
        </div>

        <div class="sketch-divider"></div>
        
        <div class="flex gap-3 justify-end">
          <a href="/" class="sketch-btn btn-cream px-5 py-2">ยกเลิก</a>
          <button type="submit" class="sketch-btn btn-green px-6 py-2">บันทึกข้อมูลส่วนตัว 💾</button>
        </div>
      </form>
    </div>
  </div>

</body>
</html>
